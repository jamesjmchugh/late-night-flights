<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>OVERHEAD // VECTOR FLIGHT SCOPE</title>

<!-- Monospace phosphor font. Falls back to system monospace if offline. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />

<!--
  Dependencies (CDN). Keep to d3 + topojson only.
  - d3 v7 provides geoOrthographic / geoPath / geoGraticule / geoCircle / geoDistance.
  - topojson-client decodes the world-atlas TopoJSON.
  - world-atlas land-110m.json is fetched at runtime (see loadWorld()).
-->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<style>
  :root {
    --bg:        #04080a;
    --green:     #3ef08a;
    --green-dim: #1d7a48;
    --amber:     #ffb347;
    --amber-hot: #ff9e2c;
    --red:       #ff4d4d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--amber);
    font-family: "Share Tech Mono", "Courier New", monospace;
    -webkit-font-smoothing: none;
  }

  body.hide-cursor { cursor: none; }

  #scope {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    display: block;
  }

  /* ---- CRT overlays (toggled by CONFIG via .on class) ---- */

  /* Faint scanlines */
  #scanlines {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0)   0px,
      rgba(0,0,0,0)   2px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
  }
  #scanlines.on { opacity: 1; }

  /* Subtle vignette so the corners fall off like a CRT tube */
  #vignette {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 19;
    opacity: 0;
    background: radial-gradient(
      ellipse at center,
      rgba(0,0,0,0) 55%,
      rgba(0,0,0,0.55) 100%
    );
  }
  #vignette.on { opacity: 1; }

  /* ---- HUD ---- */
  .hud {
    position: fixed;
    z-index: 30;
    pointer-events: none;
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    text-shadow: 0 0 6px rgba(255,158,44,0.65), 0 0 12px rgba(255,158,44,0.35);
    font-size: 14px;
    line-height: 1.55;
    white-space: pre;
    /* --ui is set from CONFIG.UI_SCALE in JS; scale from each anchored corner */
    transform: scale(var(--ui, 1));
  }
  #hud-tl { top: 18px; left: 22px; transform-origin: top left; }
  #hud-tr { top: 18px; right: 22px; text-align: right; transform-origin: top right; }
  #hud-bl { bottom: 16px; left: 22px; font-size: 12px; opacity: 0.7; transform-origin: bottom left; }
  #hud-br { bottom: 16px; right: 22px; font-size: 12px; text-align: right; transform-origin: bottom right; }

  .hud .big { font-size: 20px; letter-spacing: 0.22em; }
  .hud .dim { opacity: 0.55; }
  .hud .label { opacity: 0.55; }

  #status.nosignal {
    color: var(--amber-hot);
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0.25; } }

  #status.live { color: var(--green); text-shadow: 0 0 6px rgba(62,240,138,0.6); }
</style>
</head>
<body>
  <canvas id="scope"></canvas>

  <div id="vignette"></div>
  <div id="scanlines"></div>

  <!-- HUD: rendered as DOM for crisp text; the scope itself is canvas. -->
  <div id="hud-tl" class="hud">
    <span class="big" id="clock">--:--:--</span><span class="dim" id="date"> ---</span>
    <br /><span class="label">TRACKING </span><span id="count">00</span><span class="label"> CONTACTS</span>
    <br /><span class="label">CLOSEST  </span><span id="closest">---</span>
  </div>

  <div id="hud-tr" class="hud">
    <span id="status" class="nosignal">NO SIGNAL</span>
    <br /><span class="label">SRC </span><span id="src">MOCK</span>
    <br /><span class="label">RNG </span><span id="rng">--</span>
  </div>

  <div id="hud-bl" class="hud">OVERHEAD VECTOR SCOPE // PHOSPHOR-7</div>
  <div id="hud-br" class="hud"><span class="label">STA </span><span id="home-label">--</span></div>

<script>
/* ============================================================================
 * CONFIG  — edit these.
 * ==========================================================================*/
const CONFIG = {
  // Center of the scope / origin of the range rings.
  // Default: 19522 Crescent Haven Dr, Cypress, TX 77433.
  HOME_LAT: 29.95273,
  HOME_LON: -95.74904,
  HOME_LABEL: "HOME",                 // short tag shown at the home marker

  // Live data endpoint (readsb / tar1090 aircraft.json).
  DATA_URL: "http://localhost:8080/tar1090/data/aircraft.json",

  // When true, ignore DATA_URL and generate synthetic traffic so you can
  // develop / demo with no receiver. Set false once your receiver is up.
  USE_MOCK: true,

  MAX_RANGE_NM: 60,                   // outer range ring radius (nautical miles) —
                                      // realistic coverage for a home ADS-B receiver
  REFRESH_MS: 1000,                   // poll interval
  UNITS: "imperial",                  // "imperial" (ft/kt/nm). Only imperial implemented.

  ALERT_NM: 10,                       // contacts within this range turn red
  DROP_AFTER_S: 30,                   // remove a contact this long after last position
  STALE_AFTER_S: 8,                   // start fading a contact after this many s stale
  TRAILS: true,                       // fading breadcrumb history behind each contact
  TRAIL_SEC: 24,                      // seconds of history — fades out by the 4th crumb
  TRAIL_SAMPLE_S: 6,                  // seconds between breadcrumbs
  PREDICT_MIN: 2.0,                   // velocity beam length (minutes of travel) —
                                      // drawn only for the SELECTED contact

  TYPE_SILHOUETTES: true,             // draw aircraft-type silhouettes (by category) instead of a chevron
  AIRLINE_TAGS: true,                 // draw small airline chips on contact labels
  AIRLINE_LOGOS: true,                // real airline logos (pixelized, fetched from a CDN
                                      // by IATA code); falls back to colored IATA chips
                                      // while loading / offline
  AIRLINE_LOGO_URL: "https://images.kiwi.com/airlines/64x64/{iata}.png",

  UI_SCALE: 2,                        // global multiplier for ALL text / icons / strokes / HUD.
                                      // Bump for a bigger projector throw, drop toward 1 for dense traffic.

  // ---- CRT polish (kept subtle on purpose — this runs all night) ----
  SCANLINES: true,
  VIGNETTE: true,
  FLICKER: true,
  FLICKER_AMOUNT: 0.04,               // 0 = none, 0.04 = barely-there
  GLOW: true,                         // master switch for shadowBlur bloom
  GLOW_BLUR: 8,                       // shadowBlur radius for green strokes

  // ---- Very dark raster basemap under the wireframe ----
  BASEMAP: true,                      // draw local geography (roads/water) beneath the scope
  BASEMAP_URL: "https://basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png",
  BASEMAP_BRIGHTNESS: 0.65,           // 0..1 RGB multiplier — keep low so phosphor lines dominate
  BASEMAP_GAMMA: 1.6,                 // >1 lifts dark detail (roads vs land) without washing out
  BASEMAP_MAX_ZOOM: 12,               // tile zoom ceiling (relevant at small MAX_RANGE_NM)

  CURSOR_IDLE_MS: 2500,               // hide mouse cursor after this idle time

  // Mock traffic
  MOCK_MIN: 14,
  MOCK_MAX: 19,
};

/* ============================================================================
 * CORS NOTE
 * ----------------------------------------------------------------------------
 * aircraft.json is served by tar1090. If you serve THIS page from a different
 * origin than the receiver, the browser will block the fetch (CORS) and you'll
 * see "NO SIGNAL". Two clean fixes:
 *
 *   (a) Serve index.html from the SAME origin as tar1090 (e.g. drop it next to
 *       the tar1090 files, or reverse-proxy both under one host:port). Then set
 *       DATA_URL to a same-origin relative path like "/tar1090/data/aircraft.json".
 *
 *   (b) Point DATA_URL at a tiny SAME-ORIGIN proxy that fetches aircraft.json
 *       server-side and echoes it back with permissive headers. (Not built here
 *       — any 10-line nginx proxy_pass or a small script will do.)
 *
 * The app never crashes on a failed fetch: it shows "NO SIGNAL" and keeps
 * retrying every REFRESH_MS.
 * ==========================================================================*/

/* ============================================================================
 * Constants / helpers
 * ==========================================================================*/
const EARTH_NM = 3440.065;            // earth radius in nautical miles
const DEG = Math.PI / 180;
const RAD = 180 / Math.PI;
const EMERGENCY_SQUAWKS = new Set(["7500", "7600", "7700"]);

const COL = {
  bg:    "#04080a",
  green: "#3ef08a",
  greenDim: "#1d7a48",
  amber: "#ffb347",
  amberHot: "#ff9e2c",
  red:   "#ff4d4d",
};

const nowSec = () => performance.now() / 1000;
const pad2 = (n) => String(n).padStart(2, "0");

// Great-circle destination point from (lat,lon) along bearing (deg) for dist (nm).
function geoDest(lat, lon, bearingDeg, distNm) {
  const d  = distNm / EARTH_NM;             // angular distance (rad)
  const br = bearingDeg * DEG;
  const la1 = lat * DEG, lo1 = lon * DEG;
  const sinLa2 = Math.sin(la1) * Math.cos(d) + Math.cos(la1) * Math.sin(d) * Math.cos(br);
  const la2 = Math.asin(Math.max(-1, Math.min(1, sinLa2)));
  const y = Math.sin(br) * Math.sin(d) * Math.cos(la1);
  const x = Math.cos(d) - Math.sin(la1) * sinLa2;
  const lo2 = lo1 + Math.atan2(y, x);
  return [la2 * RAD, ((lo2 * RAD + 540) % 360) - 180];   // [lat, lon]
}

// Distance home -> point, in nm.
function distNmFromHome(lat, lon) {
  const d = d3.geoDistance([CONFIG.HOME_LON, CONFIG.HOME_LAT], [lon, lat]); // radians
  return d * EARTH_NM;
}

/* ============================================================================
 * Canvas / projection setup
 * ==========================================================================*/
const canvas = document.getElementById("scope");
const ctx = canvas.getContext("2d");

let W = 0, H = 0, DPR = 1;
let CX = 0, CY = 0;               // scope center (CSS px)
let OUTER_R = 0;                  // outer range ring radius (CSS px)

// Orthographic projection — true globe geometry, centered on HOME and zoomed
// so MAX_RANGE_NM maps to the outer ring. Because HOME is the projection
// center, lines of constant range project to concentric circles and compass
// bearings project to straight radials — exactly what a radar scope wants.
const projection = d3.geoOrthographic()
  .rotate([-CONFIG.HOME_LON, -CONFIG.HOME_LAT])
  .clipAngle(90);

const path = d3.geoPath(projection, ctx);

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  CX = W / 2;
  CY = H / 2;
  // Leave margin for outer labels.
  OUTER_R = Math.min(W, H) * 0.43;

  const angRad = CONFIG.MAX_RANGE_NM / EARTH_NM;     // angular radius of outer ring
  const scale = OUTER_R / Math.sin(angRad);
  projection.scale(scale).translate([CX, CY]);
}
window.addEventListener("resize", resize);
resize();

// Pixel radius of a given range (nm) — valid because HOME is the projection pole.
const ringPx = (nm) => projection.scale() * Math.sin(nm / EARTH_NM);

/* ============================================================================
 * World geometry (coastlines + graticule)
 * ==========================================================================*/
let land = null;        // GeoJSON feature for land (coastlines)
let worldReady = false;

// Graticule limited to a window around HOME so we get a fine local grid.
// Step tightens at short range so the disc still shows a few grid lines.
const GRAT_STEP = CONFIG.MAX_RANGE_NM <= 75 ? 0.5 : 1;
const graticule = d3.geoGraticule()
  .stepMinor([GRAT_STEP, GRAT_STEP])
  .extentMinor([
    [CONFIG.HOME_LON - 6, CONFIG.HOME_LAT - 6],
    [CONFIG.HOME_LON + 6, CONFIG.HOME_LAT + 6.0001],
  ]);

async function loadWorld() {
  try {
    const topo = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json")
      .then((r) => r.json());
    land = topojson.feature(topo, topo.objects.land);
    worldReady = true;
  } catch (e) {
    // Offline / blocked: we still render rings + graticule. Just no coastlines.
    console.warn("world-atlas load failed; coastlines disabled.", e);
  }
}
loadWorld();

/* ============================================================================
 * Dark basemap (raster underlay)
 * ----------------------------------------------------------------------------
 * Web-mercator tiles (CARTO dark, no labels) are fetched once, stitched into
 * an offscreen canvas, then reprojected pixel-by-pixel into the scope's
 * orthographic view and dimmed by BASEMAP_BRIGHTNESS. The projection is static
 * (fixed center + zoom), so this costs one pass at load / resize; per frame
 * it's a single drawImage. Fails soft: any network / CORS problem just leaves
 * the wireframe-only look.
 * ==========================================================================*/
const TILE_PX = 256;
let basemap = null;               // finished orthographic bitmap, drawn in drawGlobe()
let basemapToken = 0;             // invalidates in-flight rebuilds on resize

function loadTile(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";                    // needed for getImageData
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);                // missing tile: stays black
    img.src = url;
  });
}

// Web-mercator Y in [0,1) for a latitude.
function mercY01(latDeg) {
  const s = Math.sin(latDeg * DEG);
  return 0.5 - Math.log((1 + s) / (1 - s)) / (4 * Math.PI);
}

async function rebuildBasemap() {
  if (!CONFIG.BASEMAP) return;
  const token = ++basemapToken;

  // Geographic window of the whole canvas (the map runs past the outer ring
  // to the screen edges), with a small margin.
  const k = projection.scale();
  const diagPx = Math.hypot(W, H) / 2;               // center -> farthest corner
  const rDeg = Math.asin(Math.min(1, diagPx / k)) * RAD * 1.06;
  const lat0 = CONFIG.HOME_LAT, lon0 = CONFIG.HOME_LON;
  const cosLat = Math.cos(lat0 * DEG);
  const latMin = Math.max(-85, lat0 - rDeg), latMax = Math.min(85, lat0 + rDeg);
  const lonMin = lon0 - rDeg / cosLat, lonMax = lon0 + rDeg / cosLat;

  // Zoom whose ground resolution matches the screen, backed off to a sane
  // tile count (each level down quarters the count).
  const metersPerPx = (CONFIG.MAX_RANGE_NM * 1852) / (OUTER_R * DPR);
  let z = Math.round(Math.log2((156543.03 * cosLat) / metersPerPx));
  z = Math.max(3, Math.min(CONFIG.BASEMAP_MAX_ZOOM, z));
  let tx0, ty0, tx1, ty1;
  for (;; z--) {
    const n = 1 << z;
    tx0 = Math.floor(((lonMin + 180) / 360) * n);
    tx1 = Math.floor(((lonMax + 180) / 360) * n);
    ty0 = Math.floor(mercY01(latMax) * n);
    ty1 = Math.floor(mercY01(latMin) * n);
    if (z <= 3 || (tx1 - tx0 + 1) * (ty1 - ty0 + 1) <= 150) break;
  }

  // Stitch tiles into one mercator canvas.
  const cols = tx1 - tx0 + 1, rows = ty1 - ty0 + 1, nTiles = 1 << z;
  const merc = document.createElement("canvas");
  merc.width = cols * TILE_PX;
  merc.height = rows * TILE_PX;
  const mctx = merc.getContext("2d", { willReadFrequently: true });
  await Promise.all(Array.from({ length: cols * rows }, (_, i) => {
    const tx = tx0 + (i % cols), ty = ty0 + ((i / cols) | 0);
    const url = CONFIG.BASEMAP_URL
      .replace("{z}", z)
      .replace("{x}", ((tx % nTiles) + nTiles) % nTiles)
      .replace("{y}", ty);
    return loadTile(url).then((img) => {
      if (img) mctx.drawImage(img, (tx - tx0) * TILE_PX, (ty - ty0) * TILE_PX);
    });
  }));
  if (token !== basemapToken) return;                 // superseded by a resize

  let src;
  try {
    src = mctx.getImageData(0, 0, merc.width, merc.height);
  } catch (e) {
    console.warn("basemap disabled (canvas tainted — tiles served without CORS?)", e);
    return;
  }

  // Reproject mercator -> orthographic over the FULL canvas. Inverse
  // orthographic centered on HOME: X,Y are unit-sphere screen offsets, then
  // standard closed-form inversion.
  const outW = Math.ceil(W * DPR), outH = Math.ceil(H * DPR);
  const out = document.createElement("canvas");
  out.width = outW;
  out.height = outH;
  const octx = out.getContext("2d");
  const dst = octx.createImageData(outW, outH);
  const S = src.data, D = dst.data;

  const sinLat0 = Math.sin(lat0 * DEG), cosLat0 = cosLat;
  const worldPx = TILE_PX * nTiles;                   // full mercator extent at z, in px
  const mw = merc.width, mh = merc.height;
  const cx = CX * DPR, cy = CY * DPR, ringPxD = OUTER_R * DPR;

  // Tone curve LUT: gamma lift (brings up dark roads/water edges) then dim.
  const LUT = new Uint8Array(256);
  for (let v = 0; v < 256; v++) {
    LUT[v] = Math.min(255,
      255 * Math.pow(v / 255, 1 / CONFIG.BASEMAP_GAMMA) * CONFIG.BASEMAP_BRIGHTNESS);
  }

  for (let j = 0; j < outH; j++) {
    const Y = (cy - (j + 0.5)) / (k * DPR);           // north-positive sphere offset
    const dy = j + 0.5 - cy;
    for (let i = 0; i < outW; i++) {
      const X = (i + 0.5 - cx) / (k * DPR);
      const r2 = X * X + Y * Y;
      if (r2 >= 1) continue;                          // past the globe horizon
      const cosC = Math.sqrt(1 - r2);
      const lat = Math.asin(cosC * sinLat0 + Y * cosLat0) * RAD;
      const lon = lon0 + Math.atan2(X, cosC * cosLat0 - Y * sinLat0) * RAD;

      const px = (((lon + 180) / 360) * worldPx - tx0 * TILE_PX) | 0;
      const py = (mercY01(lat) * worldPx - ty0 * TILE_PX) | 0;
      if (px < 0 || py < 0 || px >= mw || py >= mh) continue;

      // Beyond the outer ring, ease the map down so the scope stays focal.
      const dx = i + 0.5 - cx;
      const rPx = Math.sqrt(dx * dx + dy * dy);
      const fade = rPx <= ringPxD ? 1
        : Math.max(0.45, 1 - 0.55 * ((rPx - ringPxD) / ringPxD));

      const si = (py * mw + px) * 4, di = (j * outW + i) * 4;
      D[di]     = LUT[S[si]]     * fade;
      D[di + 1] = LUT[S[si + 1]] * fade;
      D[di + 2] = LUT[S[si + 2]] * fade;
      D[di + 3] = 255;
    }
  }
  octx.putImageData(dst, 0, 0);
  basemap = out;
}
rebuildBasemap();

// The disc always shows the same geographic window, so the old bitmap stays
// geometrically valid while resizing — just rebuild (debounced) for sharpness.
let basemapResizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(basemapResizeTimer);
  basemapResizeTimer = setTimeout(rebuildBasemap, 350);
});

/* ============================================================================
 * Aircraft state
 * ==========================================================================*/
// Map hex -> contact. Each contact carries an authoritative fix (lat/lon/track/gs)
// plus the time it was set; the renderer dead-reckons between polls so motion is
// smooth at 60fps even though we only poll once a second.
const contacts = new Map();
let selectedHex = null;
let lastSignalOK = false;
let lastDataTime = 0;

function reckonPos(ac, t) {
  const dt = t - ac._t;                                  // seconds since fix
  if (!ac.gs || dt <= 0) return [ac.lat, ac.lon];
  const nm = ac.gs * (dt / 3600);
  return geoDest(ac.lat, ac.lon, ac.track || 0, nm);     // [lat, lon]
}

function cleanCallsign(flight) {
  if (!flight) return null;
  const s = String(flight).trim().toUpperCase();
  return s.length ? s : null;
}

// Merge one poll's worth of aircraft into the contacts map.
function ingest(list, t) {
  const seen = new Set();
  for (const a of list) {
    if (typeof a.lat !== "number" || typeof a.lon !== "number") continue; // skip no-position
    const hex = (a.hex || "").toLowerCase();
    if (!hex) continue;
    seen.add(hex);

    let c = contacts.get(hex);
    if (!c) { c = { hex }; contacts.set(hex, c); }

    c.lat = a.lat;
    c.lon = a.lon;
    c.track = (typeof a.track === "number") ? a.track : (c.track || 0);
    c.gs = (typeof a.gs === "number") ? a.gs : 0;
    c.alt = (a.alt_baro === "ground") ? "GND"
          : (typeof a.alt_baro === "number") ? a.alt_baro : null;
    c.baroRate = (typeof a.baro_rate === "number") ? a.baro_rate : null;
    c.callsign = cleanCallsign(a.flight) || c.callsign || null;
    c.squawk = a.squawk || c.squawk || null;
    c.category = a.category || c.category || null;
    c.seenPos = (typeof a.seen_pos === "number") ? a.seen_pos : 0;
    c._t = t - c.seenPos;            // fix is seen_pos seconds old already
    c._lastUpdate = t;
  }

  // Age out contacts not heard from in DROP_AFTER_S.
  for (const [hex, c] of contacts) {
    if (!seen.has(hex) && (t - c._lastUpdate) > CONFIG.DROP_AFTER_S) {
      contacts.delete(hex);
      if (selectedHex === hex) selectedHex = null;
    }
  }
}

/* ============================================================================
 * Mock traffic
 * ==========================================================================*/
const AIRLINES = ["UAL","AAL","DAL","SWA","JBU","ASA","FDX","UPS","SKW","ENY",
                  "FFT","NKS","BAW","AFR","KLM","DLH","ACA","RPA","QXE","AAY"];
let mockInit = false;

// Airline colored-square "logos": brand colour + IATA code, keyed by the 3-letter
// ICAO callsign prefix. Deliberate splashes of real brand colour against the
// monochrome scope, per request. Unknown prefixes (GA / military / cargo) get none.
const AIRLINES_DB = {
  UAL:{iata:"UA",color:"#0033A0"}, AAL:{iata:"AA",color:"#0078D2"},
  DAL:{iata:"DL",color:"#E3132C"}, SWA:{iata:"WN",color:"#304CB2"},
  JBU:{iata:"B6",color:"#003876"}, ASA:{iata:"AS",color:"#01426A"},
  FDX:{iata:"FX",color:"#4D148C"}, UPS:{iata:"5X",color:"#5A3A22"},
  SKW:{iata:"OO",color:"#14477D"}, ENY:{iata:"MQ",color:"#0078D2"},
  FFT:{iata:"F9",color:"#00854A"}, NKS:{iata:"NK",color:"#FFEC00"},
  BAW:{iata:"BA",color:"#075AAA"}, AFR:{iata:"AF",color:"#002157"},
  KLM:{iata:"KL",color:"#00A1DE"}, DLH:{iata:"LH",color:"#05164D"},
  ACA:{iata:"AC",color:"#D22630"}, RPA:{iata:"YX",color:"#B31942"},
  QXE:{iata:"QX",color:"#2E6B3F"}, AAY:{iata:"G4",color:"#F47920"},
};
function airlineFor(callsign) {
  if (!callsign) return null;
  const m = /^([A-Z]{3})\d/.exec(callsign);
  return m ? (AIRLINES_DB[m[1]] || null) : null;
}

// Plausible US tail number for GA / bizjets / rotorcraft.
function randReg() {
  const L = "ABCDEFGHJKLMNPRSTUVWXYZ";
  return "N" + (100 + (Math.random() * 899 | 0)) +
    L[(Math.random() * L.length) | 0] + L[(Math.random() * L.length) | 0];
}

function randHex() {
  return Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, "0");
}

function spawnMock() {
  const brgFromHome = Math.random() * 360;
  const dist = Math.random() * CONFIG.MAX_RANGE_NM * 0.92;
  const [lat, lon] = geoDest(CONFIG.HOME_LAT, CONFIG.HOME_LON, brgFromHome, dist);

  // Pick a type so the scope shows a mix of silhouettes.
  const roll = Math.random();
  let cat, flight, alt, gs;
  if (roll < 0.12) {                    // light GA (straight-wing)
    cat = "A1"; flight = randReg();
    alt = Math.round((800 + Math.random() * 8000) / 100) * 100;
    gs  = Math.round(85 + Math.random() * 80);
  } else if (roll < 0.18) {             // helicopter
    cat = "A7"; flight = randReg();
    alt = Math.round((400 + Math.random() * 2600) / 100) * 100;
    gs  = Math.round(55 + Math.random() * 85);
  } else if (roll < 0.24) {             // business jet
    cat = "A2"; flight = randReg();
    alt = Math.round((18000 + Math.random() * 25000) / 500) * 500;
    gs  = Math.round(380 + Math.random() * 90);
  } else if (roll < 0.27) {             // military / fast
    cat = "A6"; flight = ["RCH","PAT","EVAC","SLAM"][(Math.random()*4)|0] + (10 + (Math.random()*89|0));
    alt = Math.round((15000 + Math.random() * 25000) / 500) * 500;
    gs  = Math.round(420 + Math.random() * 200);
  } else {                              // airliner (narrow / 757 / heavy)
    cat = Math.random() < 0.28 ? "A5" : (Math.random() < 0.18 ? "A4" : "A3");
    flight = AIRLINES[(Math.random() * AIRLINES.length) | 0] + (100 + (Math.random() * 899 | 0));
    alt = Math.round((24000 + Math.random() * 17000) / 500) * 500;
    gs  = Math.round(380 + (alt / 41000) * 120 + Math.random() * 40);
  }

  const emergency = Math.random() < 0.04;
  return {
    hex: randHex(),
    flight,
    lat, lon,
    track: Math.random() * 360,
    gs,
    alt_baro: alt,
    baro_rate: Math.round((Math.random() - 0.45) * 1800),
    squawk: emergency ? ["7700","7600","7500"][(Math.random()*3)|0]
                      : String(1000 + (Math.random() * 6000 | 0)),
    category: cat,
    seen_pos: 0,
    rssi: -(8 + Math.random() * 20),
  };
}

let mockFleet = [];
function mockData(t) {
  if (!mockInit) {
    const n = CONFIG.MOCK_MIN + ((Math.random() * (CONFIG.MOCK_MAX - CONFIG.MOCK_MIN + 1)) | 0);
    for (let i = 0; i < n; i++) {
      const m = spawnMock();
      m._t = t;
      mockFleet.push(m);
    }
    mockInit = true;
  }

  // Advance each mock contact along its track since last commit.
  for (const m of mockFleet) {
    const [lat, lon] = geoDest(m.lat, m.lon, m.track, m.gs * ((t - m._t) / 3600));
    m.lat = lat; m.lon = lon; m._t = t;
    m.track += (Math.random() - 0.5) * 1.5;            // gentle wander
    if (m.baro_rate) m.alt_baro = Math.max(800, Math.min(43000, m.alt_baro + m.baro_rate / 60));

    // Respawn if it has wandered well outside range.
    if (distNmFromHome(m.lat, m.lon) > CONFIG.MAX_RANGE_NM * 1.08) {
      Object.assign(m, spawnMock());
      m._t = t;
    }
  }

  return { now: t, aircraft: mockFleet.map((m) => ({ ...m, seen_pos: 0 })) };
}

/* ============================================================================
 * Data polling
 * ==========================================================================*/
async function poll() {
  const t = nowSec();
  try {
    let data;
    if (CONFIG.USE_MOCK) {
      data = mockData(t);
    } else {
      const res = await fetch(CONFIG.DATA_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      data = await res.json();
    }
    ingest(Array.isArray(data.aircraft) ? data.aircraft : [], t);
    lastSignalOK = true;
    lastDataTime = t;
  } catch (e) {
    lastSignalOK = false;   // NO SIGNAL; keep existing contacts until they age out
  }
}
setInterval(poll, CONFIG.REFRESH_MS);
poll();

/* ============================================================================
 * Drawing
 * ==========================================================================*/
// Global size multiplier for all overlay graphics (text, icons, strokes).
// Geometry that tracks the screen (globe disc, ring radii, compass placement)
// is left alone; only the drawn line weights / glyph / font sizes scale.
const UI = CONFIG.UI_SCALE;
const fontPx = (px) => Math.round(px * UI) + "px 'Share Tech Mono', monospace";

function setGlow(color, blur) {
  if (CONFIG.GLOW) {
    ctx.shadowColor = color;
    ctx.shadowBlur = blur;
  } else {
    ctx.shadowBlur = 0;
  }
}
function clearGlow() { ctx.shadowBlur = 0; }

function drawGlobe() {
  // Dark raster basemap (pre-reprojected full-canvas bitmap; runs past the
  // outer ring with a baked-in fade — see rebuildBasemap).
  if (basemap) {
    clearGlow();
    ctx.drawImage(basemap, 0, 0, W, H);
  }

  // Clip the wireframe layers to the outer scope circle.
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, OUTER_R, 0, Math.PI * 2);
  ctx.clip();

  // Graticule (faint local grid)
  setGlow(COL.green, CONFIG.GLOW_BLUR * 0.6);
  ctx.strokeStyle = "rgba(62,240,138,0.16)";
  ctx.lineWidth = 1 * UI;
  ctx.beginPath();
  path(graticule());
  ctx.stroke();

  // Coastlines (thin wireframe, brighter)
  if (worldReady && land) {
    setGlow(COL.green, CONFIG.GLOW_BLUR);
    ctx.strokeStyle = "rgba(62,240,138,0.85)";
    ctx.lineWidth = 1.4 * UI;
    ctx.beginPath();
    path(land);
    ctx.stroke();
  }

  ctx.restore();
  clearGlow();
}

function drawRings() {
  ctx.save();
  setGlow(COL.green, CONFIG.GLOW_BLUR);
  ctx.font = fontPx(12);
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";

  // Choose a sensible ring interval.
  const max = CONFIG.MAX_RANGE_NM;
  let step = 25;
  if (max > 400) step = 100;
  else if (max > 200) step = 50;
  else if (max <= 60) step = 10;

  for (let nm = step; nm <= max + 0.5; nm += step) {
    const r = ringPx(nm);
    const isOuter = nm + step > max + 0.5;
    ctx.strokeStyle = isOuter ? "rgba(62,240,138,0.9)" : "rgba(62,240,138,0.32)";
    ctx.lineWidth = (isOuter ? 1.8 : 1) * UI;
    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI * 2);
    ctx.stroke();

    // Label along the upper-right diagonal so it stays clear of compass ticks.
    ctx.fillStyle = "rgba(62,240,138,0.7)";
    const lx = CX + r * Math.cos(-Math.PI / 4) + 4 * UI;
    const ly = CY + r * Math.sin(-Math.PI / 4) - 2 * UI;
    ctx.fillText(nm + "NM", lx, ly);
  }
  ctx.restore();
  clearGlow();
}

function drawCompass() {
  ctx.save();
  setGlow(COL.green, CONFIG.GLOW_BLUR);
  ctx.strokeStyle = "rgba(62,240,138,0.7)";
  ctx.fillStyle = "rgba(62,240,138,0.85)";
  ctx.lineWidth = 1.2 * UI;
  ctx.font = fontPx(13);
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (let brg = 0; brg < 360; brg += 30) {
    const a = brg * DEG;
    const sin = Math.sin(a), cos = Math.cos(a);
    const major = brg % 90 === 0;
    const r0 = OUTER_R - (major ? 16 : 9) * UI;
    const x0 = CX + r0 * sin, y0 = CY - r0 * cos;
    const x1 = CX + OUTER_R * sin, y1 = CY - OUTER_R * cos;
    ctx.lineWidth = (major ? 1.8 : 1) * UI;
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();

    if (major) {
      const lab = { 0: "N", 90: "E", 180: "S", 270: "W" }[brg];
      const lr = OUTER_R + 16 * UI;
      ctx.fillText(lab, CX + lr * sin, CY - lr * cos);
    } else {
      const lr = OUTER_R + 13 * UI;
      ctx.font = fontPx(10);
      ctx.fillStyle = "rgba(62,240,138,0.5)";
      ctx.fillText(pad2(brg / 10 | 0) + "0", CX + lr * sin, CY - lr * cos);
      ctx.font = fontPx(13);
      ctx.fillStyle = "rgba(62,240,138,0.85)";
    }
  }
  ctx.restore();
  clearGlow();
}

function drawHome() {
  const p = projection([CONFIG.HOME_LON, CONFIG.HOME_LAT]);
  if (!p) return;
  const [x, y] = p;
  ctx.save();
  setGlow(COL.green, CONFIG.GLOW_BLUR);
  ctx.strokeStyle = COL.green;
  ctx.fillStyle = COL.green;
  ctx.lineWidth = 1.5 * UI;

  // Reticle: small cross + ring + diamond
  ctx.beginPath();
  ctx.arc(x, y, 5 * UI, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - 10 * UI, y); ctx.lineTo(x + 10 * UI, y);
  ctx.moveTo(x, y - 10 * UI); ctx.lineTo(x, y + 10 * UI);
  ctx.stroke();

  ctx.font = fontPx(11);
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  ctx.fillText(CONFIG.HOME_LABEL, x + 9 * UI, y + 7 * UI);
  ctx.restore();
  clearGlow();
}

function contactColor(c, distNm) {
  const emergency = c.squawk && EMERGENCY_SQUAWKS.has(c.squawk);
  if (emergency || distNm <= CONFIG.ALERT_NM) return COL.red;
  return COL.amber;
}

/* ---- Aircraft-type silhouettes -------------------------------------------
 * Top-down plan view, nose = -Y, drawn in a ~[-1,1] box and scaled per type.
 * Selected by ADS-B emitter category (the only type hint aircraft.json gives):
 *   A1 light  A2 small/bizjet  A3 large  A4 757  A5 heavy  A6 mil  A7 rotor
 * Compiled to Path2D once, stroked as glowing wireframe to match the scope.
 * --------------------------------------------------------------------------*/
const SIL_PATHS = {
  // narrow-body twin jet (737 / A320)
  narrow: "M0,-1 C.05,-1 .085,-.86 .09,-.5 L.10,-.18 L.92,.20 L.92,.31 L.105,.10 L.09,.5 L.33,.86 L.33,.95 L.055,.80 L.05,1 L-.05,1 L-.055,.80 L-.33,.95 L-.33,.86 L-.09,.5 L-.105,.10 L-.92,.31 L-.92,.20 L-.10,-.18 L-.09,-.5 C-.085,-.86 -.05,-1 0,-1 Z",
  // wide-body / heavy (777 / 747 / A350)
  wide:   "M0,-1.05 C.06,-1.04 .11,-.86 .12,-.46 L.13,-.16 L.98,.24 L.98,.36 L.135,.08 L.12,.52 L.40,.88 L.40,.97 L.07,.82 L.06,1.05 L-.06,1.05 L-.07,.82 L-.40,.97 L-.40,.88 L-.12,.52 L-.135,.08 L-.98,.36 L-.98,.24 L-.13,-.16 L-.12,-.46 C-.11,-.86 -.06,-1.04 0,-1.05 Z",
  // business jet (slim, low sweep)
  biz:    "M0,-1 C.04,-1 .06,-.8 .065,-.35 L.07,0 L.62,.30 L.62,.38 L.075,.16 L.07,.62 L.26,.84 L.26,.92 L.045,.78 L.04,1 L-.04,1 L-.045,.78 L-.26,.92 L-.26,.84 L-.07,.62 L-.075,.16 L-.62,.38 L-.62,.30 L-.07,0 L-.065,-.35 C-.06,-.8 -.04,-1 0,-1 Z",
  // light GA (straight high-aspect wings)
  light:  "M0,-1 C.035,-.98 .05,-.7 .05,-.25 L.05,-.16 L.95,-.10 L.95,.02 L.05,.04 L.045,.55 L.30,.62 L.30,.72 L.04,.66 L.035,1 L-.035,1 L-.04,.66 L-.30,.72 L-.30,.62 L-.045,.55 L-.05,.04 L-.95,.02 L-.95,-.10 L-.05,-.16 L-.05,-.25 C-.05,-.7 -.035,-.98 0,-1 Z",
  // military / fast (delta arrow)
  mil:    "M0,-1.1 L.10,-.2 L.85,.45 L.85,.58 L.12,.25 L.16,.85 L.30,.98 L.05,.95 L0,1.05 L-.05,.95 L-.30,.98 L-.16,.85 L-.12,.25 L-.85,.58 L-.85,.45 L-.10,-.2 Z",
  // helicopter body (rotor disk drawn separately, spinning)
  heli:   "M0,-.55 C.22,-.55 .26,-.2 .24,.1 C.22,.35 .12,.5 .05,.52 L.04,.95 L.10,.98 L.10,1.05 L-.10,1.05 L-.10,.98 L-.04,.95 L-.05,.52 C-.12,.5 -.22,.35 -.24,.1 C-.26,-.2 -.22,-.55 0,-.55 Z",
};
const SIL_CACHE = {};
const silPath = (k) => SIL_CACHE[k] || (SIL_CACHE[k] = new Path2D(SIL_PATHS[k]));
const CAT_SIL = { A1:"light", A2:"biz", A3:"narrow", A4:"narrow", A5:"wide",
                  A6:"mil", A7:"heli", B1:"light", B2:"light", B4:"light" };
const SIL_SIZE = { light:8, biz:9, narrow:10, wide:13, mil:9, heli:9 };
const silForCat = (cat) => CAT_SIL[cat] || "narrow";

/* ---- Airline chips: pixelized logos with colored-square fallback ---------
 * Logos are fetched lazily by IATA code, downsampled once to a small tile,
 * then drawn scaled up with smoothing off for a chunky CRT-pixel look.
 * Until a logo arrives (or if it never does), the generated brand-color +
 * IATA chip below is used, so the scope still works fully offline.
 * --------------------------------------------------------------------------*/
const LOGO_PX = 14;                          // tile resolution before pixel upscale
const logoCache = new Map();                 // iata -> canvas | "pending" | "failed"
function logoFor(iata) {
  const hit = logoCache.get(iata);
  if (hit instanceof HTMLCanvasElement) return hit;
  if (hit) return null;                      // pending or failed
  logoCache.set(iata, "pending");
  const img = new Image();
  img.onload = () => {
    const c = document.createElement("canvas");
    c.width = c.height = LOGO_PX;
    c.getContext("2d").drawImage(img, 0, 0, LOGO_PX, LOGO_PX);
    logoCache.set(iata, c);
  };
  img.onerror = () => logoCache.set(iata, "failed");
  img.src = CONFIG.AIRLINE_LOGO_URL.replace("{iata}", iata);
  return null;
}

function chipTextColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) > 140 ? "#04080a" : "#ffffff";
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
// Draws the chip and returns how far to advance the label cursor.
function drawChip(x, y, al, alpha) {
  const logo = CONFIG.AIRLINE_LOGOS ? logoFor(al.iata) : null;
  if (logo) {
    // Pixelized real logo on a dim light tile (logos are drawn for white bgs).
    const s = 15 * UI, pad = 1.5 * UI;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "rgba(222,228,224,0.92)";
    roundRect(x, y - 1 * UI, s, s, 2.5 * UI);
    ctx.fill();
    ctx.imageSmoothingEnabled = false;                 // chunky pixels
    ctx.drawImage(logo, x + pad, y - 1 * UI + pad, s - pad * 2, s - pad * 2);
    ctx.imageSmoothingEnabled = true;
    ctx.restore();
    return s + 5 * UI;
  }

  const w = 18 * UI, h = 13 * UI;
  ctx.save();
  ctx.globalAlpha = alpha;
  setGlow(al.color, 4 * UI);
  ctx.fillStyle = al.color;
  roundRect(x, y, w, h, 2.5 * UI);
  ctx.fill();
  clearGlow();
  ctx.fillStyle = chipTextColor(al.color);
  ctx.font = fontPx(10);
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(al.iata, x + w / 2, y + h / 2 + 0.5 * UI);
  ctx.restore();
  return w + 5 * UI;
}

function drawContacts(t) {
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  for (const c of contacts.values()) {
    const [lat, lon] = reckonPos(c, t);
    const p = projection([lon, lat]);
    if (!p) continue;
    const [x, y] = p;

    const dist = distNmFromHome(lat, lon);
    if (dist > CONFIG.MAX_RANGE_NM * 1.02) continue;     // off-scope

    const stale = t - c._lastUpdate;
    let alpha = 1;
    if (stale > CONFIG.STALE_AFTER_S) {
      alpha = Math.max(0.12, 1 - (stale - CONFIG.STALE_AFTER_S) /
        (CONFIG.DROP_AFTER_S - CONFIG.STALE_AFTER_S));
    }

    const selected = c.hex === selectedHex;
    const color = contactColor(c, dist);
    ctx.globalAlpha = alpha;

    // ---- breadcrumb trail (fading position history behind the aircraft) ----
    if (CONFIG.TRAILS) {
      if (!c._trail) c._trail = [];
      const last = c._trail[c._trail.length - 1];
      if (!last || t - last.t >= CONFIG.TRAIL_SAMPLE_S) {
        // A big jump (signal regained far away) means the history is bogus.
        if (last && d3.geoDistance([last.lon, last.lat], [lon, lat]) * EARTH_NM > 8) {
          c._trail = [];
        }
        c._trail.push({ lat, lon, t });
      }
      while (c._trail.length && t - c._trail[0].t > CONFIG.TRAIL_SEC) c._trail.shift();

      // Dim dots, oldest faintest. No glow — they should sit behind everything.
      clearGlow();
      ctx.fillStyle = color;
      for (const s of c._trail) {
        const sp = projection([s.lon, s.lat]);
        if (!sp) continue;
        const age = (t - s.t) / CONFIG.TRAIL_SEC;          // 0 fresh .. 1 old
        ctx.globalAlpha = alpha * 0.5 * (1 - age);
        ctx.beginPath();
        ctx.arc(sp[0], sp[1], 1.2 * UI, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = alpha;
    }

    // ---- velocity vector (selected contact only — everyone gets a trail) ----
    if (selected && c.gs > 0) {
      const aheadNm = c.gs * (CONFIG.PREDICT_MIN / 60);
      const [flat, flon] = geoDest(lat, lon, c.track || 0, aheadNm);
      const fp = projection([flon, flat]);
      if (fp) {
        setGlow(color, CONFIG.GLOW_BLUR);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.4 * UI;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(fp[0], fp[1]);
        ctx.stroke();
      }
    }

    // ---- type silhouette, rotated to track (north = up on this scope) ----
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate((c.track || 0) * DEG);
    setGlow(color, CONFIG.GLOW_BLUR);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineJoin = "round";

    if (CONFIG.TYPE_SILHOUETTES) {
      const key = silForCat(c.category);
      const g = (SIL_SIZE[key] || 9) * UI * (selected ? 1.35 : 1);
      ctx.save();
      ctx.scale(g, g);
      ctx.lineWidth = (selected ? 2.0 : 1.4) * UI / g;   // constant scaled stroke width
      const p2 = silPath(key);
      ctx.stroke(p2);
      if (selected) { ctx.globalAlpha = alpha * 0.45; ctx.fill(p2); ctx.globalAlpha = alpha; }
      ctx.restore();

      // spinning main-rotor disk for helicopters
      if (key === "heli") {
        const rr = g * 0.95;
        const spin = t * 5.5;
        ctx.lineWidth = 1.1 * UI;
        ctx.globalAlpha = alpha * 0.45;
        ctx.beginPath(); ctx.arc(0, 0, rr, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = alpha * 0.85;
        for (let b = 0; b < 2; b++) {
          const a = spin + b * Math.PI;
          ctx.beginPath();
          ctx.moveTo(-Math.cos(a) * rr, -Math.sin(a) * rr);
          ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
          ctx.stroke();
        }
        ctx.globalAlpha = alpha;
      }
    } else {
      // fallback chevron
      const s = (selected ? 9 : 7) * UI;
      ctx.lineWidth = (selected ? 2.4 : 1.6) * UI;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.7, s * 0.7);
      ctx.lineTo(0, s * 0.35);
      ctx.lineTo(-s * 0.7, s * 0.7);
      ctx.closePath();
      ctx.stroke();
      if (selected) ctx.fill();
    }
    ctx.restore();

    // selection ring
    if (selected) {
      setGlow(color, CONFIG.GLOW_BLUR);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1 * UI;
      ctx.globalAlpha = alpha * 0.8;
      ctx.beginPath();
      ctx.arc(x, y, 16 * UI, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = alpha;
    }

    // ---- airline chip + labels ----
    clearGlow();
    let lx = x + 12 * UI;
    const ly = y - 4 * UI;

    const al = CONFIG.AIRLINE_TAGS ? airlineFor(c.callsign) : null;
    if (al) lx += drawChip(lx, ly - 6.5 * UI, al, alpha);

    ctx.shadowColor = color;
    ctx.shadowBlur = CONFIG.GLOW ? 5 * UI : 0;
    ctx.fillStyle = color;
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.font = fontPx(13);
    const call = c.callsign || c.hex.toUpperCase();
    ctx.fillText(call, lx, ly);

    ctx.font = fontPx(10);
    ctx.globalAlpha = alpha * 0.85;
    let altStr;
    if (c.alt === "GND") altStr = "GND";
    else if (c.alt == null) altStr = "----";
    else if (c.alt >= 18000) altStr = "FL" + Math.round(c.alt / 100);
    else altStr = Math.round(c.alt) + "FT";
    const spdStr = c.gs ? Math.round(c.gs) + "KT" : "";
    let arrow = "";
    if (c.baroRate > 150) arrow = " ^";
    else if (c.baroRate < -150) arrow = " v";
    ctx.fillText(altStr + (spdStr ? "  " + spdStr : "") + arrow, lx, ly + 13 * UI);

    ctx.globalAlpha = 1;
    clearGlow();
  }
  ctx.globalAlpha = 1;
}

el.homeLabel.textContent =
  CONFIG.HOME_LAT.toFixed(2) + (CONFIG.HOME_LAT >= 0 ? "N" : "S") + " " +
  Math.abs(CONFIG.HOME_LON).toFixed(2) + (CONFIG.HOME_LON >= 0 ? "E" : "W");

const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

function updateHUD(t) {
  const d = new Date();
  el.clock.textContent = pad2(d.getHours()) + ":" + pad2(d.getMinutes()) + ":" + pad2(d.getSeconds());
  el.date.textContent = " " + pad2(d.getDate()) + MONTHS[d.getMonth()];

  el.count.textContent = pad2(contacts.size);

  // Closest contact
  let best = null, bestDist = Infinity;
  for (const c of contacts.values()) {
    const [lat, lon] = reckonPos(c, t);
    const dd = distNmFromHome(lat, lon);
    if (dd < bestDist) { bestDist = dd; best = c; }
  }
  if (best) {
    const name = best.callsign || best.hex.toUpperCase();
    const al = airlineFor(best.callsign);
    el.closest.textContent = (al ? al.iata + " " : "") + name + " " + bestDist.toFixed(1) + "NM";
    el.closest.style.color = bestDist <= CONFIG.ALERT_NM ? COL.red : "";
  } else {
    el.closest.textContent = "---";
    el.closest.style.color = "";
  }

  // Signal status
  if (CONFIG.USE_MOCK || lastSignalOK) {
    el.status.textContent = CONFIG.USE_MOCK ? "MOCK FEED" : "LIVE";
    el.status.className = "live";
  } else {
    el.status.textContent = "NO SIGNAL";
    el.status.className = "nosignal";
  }
}

/* ============================================================================
 * Render loop
 * ==========================================================================*/
let flickerPhase = 0;

function frame() {
  const t = nowSec();

  // Background
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.globalAlpha = 1;
  ctx.fillStyle = COL.bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle global flicker (brightness wobble) on the whole scene.
  if (CONFIG.FLICKER) {
    flickerPhase += 0.3;
    const f = 1 - CONFIG.FLICKER_AMOUNT * (0.5 + 0.5 * Math.sin(flickerPhase * 2.1) * Math.random());
    ctx.globalAlpha = Math.max(0.85, f);
  }

  drawGlobe();
  drawRings();
  drawCompass();
  drawHome();
  drawContacts(t);

  ctx.globalAlpha = 1;
  updateHUD(t);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ============================================================================
 * CRT overlays + interaction
 * ==========================================================================*/
if (CONFIG.SCANLINES) document.getElementById("scanlines").classList.add("on");
if (CONFIG.VIGNETTE) document.getElementById("vignette").classList.add("on");
document.documentElement.style.setProperty("--ui", CONFIG.UI_SCALE);   // scales the DOM HUD

// Hide cursor after idle.
let cursorTimer = null;
function pokeCursor() {
  document.body.classList.remove("hide-cursor");
  clearTimeout(cursorTimer);
  cursorTimer = setTimeout(() => document.body.classList.add("hide-cursor"), CONFIG.CURSOR_IDLE_MS);
}
window.addEventListener("mousemove", pokeCursor);
pokeCursor();

// Click to select nearest contact (within 22px).
canvas.addEventListener("click", (ev) => {
  const t = nowSec();
  const mx = ev.clientX, my = ev.clientY;
  let best = null, bestD = 22 * UI;
  for (const c of contacts.values()) {
    const [lat, lon] = reckonPos(c, t);
    const p = projection([lon, lat]);
    if (!p) continue;
    const d = Math.hypot(p[0] - mx, p[1] - my);
    if (d < bestD) { bestD = d; best = c; }
  }
  selectedHex = best ? best.hex : null;
});

// Click-to-fullscreen on double click (handy for the projector).
canvas.addEventListener("dblclick", () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
});
</script>
